# 推送分支/PR：编译 debug APK，在 Actions → Artifacts 下载。
# 推送标签 v*（例如 v1.0.0）：同次构建会发布到 GitHub Releases 并附上 APK。
# 发版示例：git tag v1.0.0 && git push origin v1.0.0

name: Build APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  assemble-debug:
    permissions:
      contents: write
    # 固定在 22.04，避免 ubuntu-latest 升级后与本项目旧版 AGP/Gradle 工具链偶发不兼容
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # AGP 7.2.x 支持 11/17；CI 使用 17 与当前 Actions 镜像更一致
          java-version: "17"

      - uses: android-actions/setup-android@v4
        with:
          # 与 app/build.gradle 中 compileSdk 29 一致；由本步骤一次性装好，避免另起 shell 调 sdkmanager 时 PATH/SDK 根目录不一致
          packages: "tools platform-tools platforms;android-29 build-tools;30.0.3"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Assemble debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NoWirelessCharge-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Prepare APK filename for Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          src=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          cp "$src" "NoWirelessCharge-${{ github.ref_name }}.apk"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NoWirelessCharge-${{ github.ref_name }}.apk
          generate_release_notes: true
