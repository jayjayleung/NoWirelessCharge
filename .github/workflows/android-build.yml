# 推送到 GitHub 后自动编译 debug APK，在 Actions 页下载构建产物即可。
# 若使用 Gitee/GitLab，需各自配置对应的 CI（语法类似，Runner 不同）。

name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  assemble-debug:
    # 固定在 22.04，避免 ubuntu-latest 升级后与本项目旧版 AGP/Gradle 工具链偶发不兼容
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # AGP 7.2.x 支持 11/17；CI 使用 17 与当前 Actions 镜像更一致
          java-version: "17"

      - uses: android-actions/setup-android@v4
        with:
          # 与 app/build.gradle 中 compileSdk 29 一致；由本步骤一次性装好，避免另起 shell 调 sdkmanager 时 PATH/SDK 根目录不一致
          packages: "tools platform-tools platforms;android-29 build-tools;30.0.3"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Assemble debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NoWirelessCharge-debug
          path: app/build/outputs/apk/debug/*.apk
