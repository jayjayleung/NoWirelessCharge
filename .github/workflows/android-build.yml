# 分支 / PR / workflow_dispatch：打 debug APK，在 Actions → Artifacts 下载。
# 推送标签 v*：打已签名的 release APK，并发布到 GitHub Releases。
#
# 仓库 Settings → Secrets and variables → Actions 新增：
#   RELEASE_KEYSTORE_BASE64  密钥库文件经 Base64 后的整段字符串（.jks / .keystore）
#   RELEASE_STORE_PASSWORD   密钥库密码
#   RELEASE_KEY_ALIAS        密钥别名
#   RELEASE_KEY_PASSWORD     密钥密码（常与仓库密码相同）
#
# 本地生成 Base64（示例）:  Linux/macOS: base64 -w0 release.keystore
#                         Windows PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes("release.keystore"))
#
# 发版: git tag v1.0.1 && git push origin v1.0.1

name: Build APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v4
        with:
          packages: "tools platform-tools platforms;android-29 build-tools;30.0.3"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Assemble debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: NoWirelessCharge-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.keystore"
          test -s "${{ github.workspace }}/release.keystore"

      - name: Assemble release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Prepare APK for Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          src=$(ls app/build/outputs/apk/release/*.apk | head -1)
          cp "$src" "NoWirelessCharge-${{ github.ref_name }}.apk"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NoWirelessCharge-${{ github.ref_name }}.apk
          generate_release_notes: true
