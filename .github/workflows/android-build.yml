# 分支 / PR / workflow_dispatch：打 debug APK，在 Actions → Artifacts 下载。
# 推送标签 v*：打已签名的 release APK，并发布到 GitHub Releases。
#
# 仓库 Settings → Secrets and variables → Actions 新增：
#   RELEASE_KEYSTORE_BASE64  仅密钥库的 Base64 正文（一行，勿含说明文字/BEGIN-END 标记；可有换行我们会自动去掉）
#   RELEASE_STORE_PASSWORD   密钥库密码
#   RELEASE_KEY_ALIAS        密钥别名
#   RELEASE_KEY_PASSWORD     密钥密码（常与仓库密码相同）
#
# 本地生成 Base64（示例）:  Linux/macOS: base64 -w0 release.keystore
#                         Windows PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes("release.keystore"))
#
# 发版: git tag v1.0.1 && git push origin v1.0.1

name: Build APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v4
        with:
          packages: "tools platform-tools platforms;android-29 build-tools;30.0.3"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Assemble debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: NoWirelessCharge-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          python3 << 'PY'
          import base64, os, re, sys
          raw = os.environ.get("RELEASE_KEYSTORE_BASE64", "")
          if not raw or not raw.strip():
              print("RELEASE_KEYSTORE_BASE64 为空：请在仓库 Secrets 中配置", file=sys.stderr)
              sys.exit(1)
          # 去掉粘贴时混入的空白、换行、UTF-8 BOM（避免 base64: invalid input）
          clean = re.sub(r"\s+", "", raw)
          if clean.startswith("\ufeff"):
              clean = clean[1:]
          try:
              data = base64.b64decode(clean, validate=False)
          except Exception as e:
              print("Base64 解码失败（请确认 Secret 里只有纯 Base64，无中文说明或 BASE64_BEGIN 等字样）:", e, file=sys.stderr)
              sys.exit(1)
          if len(data) < 64:
              print("解码后文件过小，可能 Secret 内容不完整", file=sys.stderr)
              sys.exit(1)
          out = os.path.join(os.environ["GITHUB_WORKSPACE"], "release.keystore")
          with open(out, "wb") as f:
              f.write(data)
          print("release.keystore OK,", len(data), "bytes")
          PY

      - name: Assemble release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Prepare APK for Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          src=$(ls app/build/outputs/apk/release/*.apk | head -1)
          cp "$src" "NoWirelessCharge-${{ github.ref_name }}.apk"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NoWirelessCharge-${{ github.ref_name }}.apk
          generate_release_notes: true
