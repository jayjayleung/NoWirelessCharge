# 推送到 GitHub 后自动编译 debug APK，在 Actions 页下载构建产物即可。
# 若使用 Gitee/GitLab，需各自配置对应的 CI（语法类似，Runner 不同）。

name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - uses: android-actions/setup-android@v3

      - name: Install Android API 29 (compileSdk)
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-29" "build-tools;30.0.3"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Assemble debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NoWirelessCharge-debug
          path: app/build/outputs/apk/debug/*.apk
